name: Build Native Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options: [release, debug]

jobs:
  build-apk:
    name: Build Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platform-tools" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore /tmp/release.keystore \
            -alias vibracode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass vibracode123 \
            -keypass vibracode123 \
            -dname "CN=VibraCode, OU=Dev, O=VibraCode, L=Riyadh, ST=Riyadh, C=SA"

      - name: Expo prebuild (generate native Android project)
        working-directory: artifacts/vibracode-mobile
        run: |
          npx expo prebuild --platform android --clean

      - name: Configure release signing
        working-directory: artifacts/vibracode-mobile/android
        run: |
          python3 << 'PYEOF'
          import re

          with open('app/build.gradle', 'r') as f:
              content = f.read()

          # Add keystore properties loading at top of android block if not exists
          if 'release.keystore' not in content:
              # Find the android { block and add keystore loading after it
              props_block = '''
          def keystorePropertiesFile = rootProject.file("keystore.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }'''
              
              content = content.replace('android {', 'android {' + props_block, 1)

          # Replace signingConfigs block
          signing_config = '''signingConfigs {
              release {
                  if (keystorePropertiesFile.exists()) {
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                  }
              }
              debug {
                  storeFile file('debug.keystore')
                  storePassword 'android'
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
              }
          }'''

          # Replace existing signingConfigs
          content = re.sub(
              r'signingConfigs\s*\{[^}]*\}',
              signing_config,
              content,
              flags=re.DOTALL
          )

          # Change buildTypes release to use release signing
          content = content.replace(
              'signingConfig signingConfigs.debug',
              'signingConfig signingConfigs.release'
          )

          with open('app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated successfully")
          PYEOF

          # Write keystore properties
          cat > keystore.properties <<EOF
          storeFile=/tmp/release.keystore
          storePassword=vibracode123
          keyAlias=vibracode
          keyPassword=vibracode123
          EOF

      - name: Build APK with Gradle
        working-directory: artifacts/vibracode-mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibraCode-Native-APK
          path: artifacts/vibracode-mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Print APK info
        working-directory: artifacts/vibracode-mobile/android/app/build/outputs/apk
        run: |
          echo "==========================================="
          echo "APK BUILD COMPLETE"
          echo "==========================================="
          find . -name "*.apk" -exec ls -lh {} \;
          echo "==========================================="
