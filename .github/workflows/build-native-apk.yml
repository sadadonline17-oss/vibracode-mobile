name: Build Native Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options: [debug, release]

jobs:
  build-apk:
    name: Build Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platform-tools" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Generate signing keystore for release
        if: github.event.inputs.build_type == 'release'
        run: |
          keytool -genkeypair \
            -v \
            -keystore /home/runner/work/vibracode-mobile/vibracode-mobile/artifacts/vibracode-mobile/android/app/release.keystore \
            -alias vibracode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass vibracode123 \
            -keypass vibracode123 \
            -dname "CN=VibraCode, OU=Dev, O=VibraCode, L=Riyadh, ST=Riyadh, C=SA"

      - name: Expo prebuild (generate native Android project)
        working-directory: artifacts/vibracode-mobile
        run: |
          npx expo prebuild --platform android --clean

      - name: Configure release signing
        if: github.event.inputs.build_type == 'release'
        working-directory: artifacts/vibracode-mobile/android
        run: |
          python3 -c "
          import re
          filepath = 'app/build.gradle'
          with open(filepath, 'r') as f:
              content = f.read()
          
          # Find the 'signingConfigs {' block and its contents
          # We need to add a 'release' entry inside it
          release_signing = '''release {
                      storeFile file('release.keystore')
                      storePassword 'vibracode123'
                      keyAlias 'vibracode'
                      keyPassword 'vibracode123'
                  }'''

          # Find 'debug {' inside signingConfigs
          debug_pattern = r'(signingConfigs\s*\{[^}]*?)(debug\s*\{[^}]*\})'
          match = re.search(debug_pattern, content, re.DOTALL)
          if match:
              # Insert release before debug
              content = content[:match.start()] + match.group(1) + release_signing + '\n            ' + match.group(2) + content[match.end():]
              print('Inserted release signing config before debug')
          else:
              print('Could not find debug signing config block')
          
          # Now change buildTypes.release.signingConfig from debug to release
          content = content.replace(
              'signingConfig signingConfigs.debug',
              'signingConfig signingConfigs.release'
          )
          
          with open(filepath, 'w') as f:
              f.write(content)
          print('Done')
          "

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: artifacts/vibracode-mobile/android
        run: ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        working-directory: artifacts/vibracode-mobile/android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibraCode-Native-APK
          path: artifacts/vibracode-mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Print APK info
        working-directory: artifacts/vibracode-mobile/android/app/build/outputs/apk
        run: |
          echo "==========================================="
          echo "APK BUILD COMPLETE"
          echo "==========================================="
          find . -name "*.apk" -exec ls -lh {} \;
          echo "==========================================="
