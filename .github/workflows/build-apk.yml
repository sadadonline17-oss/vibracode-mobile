name: Build Vibra Code APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/vibracode-mobile/**"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [preview, development, production]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: artifacts/vibracode-mobile/package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        working-directory: artifacts/vibracode-mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./vibracode.apk
        env:
          EXPO_PUBLIC_OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXPO_PUBLIC_E2B_KEY: ${{ secrets.E2B_API_KEY }}
          EXPO_PUBLIC_CLERK_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibracode-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}.apk
          path: artifacts/vibracode-mobile/vibracode.apk
          retention-days: 30

  build-local:
    name: Build APK (Local Gradle — no EAS token needed)
    runs-on: ubuntu-latest
    if: ${{ !secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild (generate native Android code)
        working-directory: artifacts/vibracode-mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: "1"
          EXPO_PUBLIC_OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Install Android dependencies
        working-directory: artifacts/vibracode-mobile
        run: pnpm install --frozen-lockfile

      - name: Build Release APK with Gradle
        working-directory: artifacts/vibracode-mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vibracode-release-${{ github.run_number }}.apk
          path: artifacts/vibracode-mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
