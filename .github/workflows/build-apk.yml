name: Build Vibra Code APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (preview=APK, production=AAB)"
        required: true
        default: "preview"
        type: choice
        options: [preview, development, production]

jobs:
  build-android:
    name: EAS Build → Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android APK)
        working-directory: artifacts/vibracode-mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENROUTER_KEY: ${{ secrets.EXPO_PUBLIC_OPENROUTER_KEY }}
          EXPO_PUBLIC_E2B_KEY: ${{ secrets.EXPO_PUBLIC_E2B_KEY }}
          EXPO_PUBLIC_CLERK_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_KEY }}
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL }}

      - name: Show build status
        run: |
          echo "✅ Build submitted to EAS!"
          echo "📱 Check progress: https://expo.dev/accounts/[your-account]/projects/vibracode/builds"
          echo "📥 Download APK from the link above when build completes (~10 min)"
