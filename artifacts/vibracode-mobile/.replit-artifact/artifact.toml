kind = "mobile"
previewPath = "/"
title = "Vibra Code Mobile"
version = "1.0.0"
id = "artifacts/vibracode-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18515

[services.development]
run = "pnpm --filter @workspace/vibracode-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibracode-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vibracode-mobile", "run", "serve" ]

[services.env]
PORT = "18515"
BASE_PATH = "/"
